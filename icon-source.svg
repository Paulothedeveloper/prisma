
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2A30"/>
      <stop offset="1" stop-color="#121214"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#top)"/>

  <!-- feixe branco de entrada -->
  <path d="M150 430 L470 486" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" filter="url(#glow)"/>

  <!-- prisma (triângulo de vidro) -->
  <path d="M512 286 L640 660 L384 660 Z" fill="#FFFFFF" fill-opacity="0.08"
        stroke="#FFFFFF" stroke-width="20" stroke-linejoin="round"/>

  <!-- espectro refratado (leque pra baixo-direita) -->
  <g stroke-width="18" stroke-linecap="round" filter="url(#glow)">
    <path d="M556 556 L900 470" stroke="#FF453A"/>
    <path d="M560 568 L905 540" stroke="#FF9F0A"/>
    <path d="M563 580 L905 606" stroke="#FFD60A"/>
    <path d="M565 592 L900 672" stroke="#30D158"/>
    <path d="M566 604 L890 736" stroke="#40C8E0"/>
    <path d="M566 616 L876 796" stroke="#0A84FF"/>
    <path d="M564 628 L858 852" stroke="#BF5AF2"/>
  </g>
</svg>